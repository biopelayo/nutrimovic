<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriMovic — Sin conexión</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #333333;
        font-family: system-ui, Arial, Helvetica, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 22rem;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: #2d6a4f;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 30px;
        font-weight: 700;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        color: #767676;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      button {
        border: 0;
        background: #2d6a4f;
        color: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">N</div>
      <h1>Sin conexión</h1>
      <p>
        No se ha podido contactar con el servidor. Revisa tu conexión o el
        backend de NutriMovic e inténtalo de nuevo.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
